name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Полная сборка: и CUDA-, и OpenVINO-путь в одном exe (авто-выбор по железу
      # делает backends.py в рантайме) — поэтому ставим все extras. --frozen: строго
      # по uv.lock (проверенный срез транзитивных зависимостей), без пере-резолва.
      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $ver = (Select-String -Path pyproject.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          if ($tag -ne $ver) {
            Write-Error "Tag '$tag' != pyproject version '$ver' — bump versions before tagging"
            exit 1
          }
          $init = (Select-String -Path reku/__init__.py -Pattern '__version__ = "(.+)"').Matches[0].Groups[1].Value
          if ($init -ne $ver) {
            Write-Error "reku/__init__.py __version__ '$init' != pyproject version '$ver'"
            exit 1
          }
          "APP_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Гейт перед публикацией: сломанный тест не должен уехать в публичный Release.
      # --no-sync ниже везде: uv run без него делает неявный пере-sync под ДЕФОЛТНЫЙ
      # набор (без extras) и выкинул бы nvidia-*/openvino из окружения предыдущего шага.
      - name: Run tests
        shell: pwsh
        run: |
          Get-ChildItem tests\test_*.py -Exclude test_frozen_smoke.py | ForEach-Object {
            uv run --no-sync python $_.FullName
            if ($LASTEXITCODE -ne 0) { Write-Error "FAILED: $($_.Name)"; exit 1 }
          }

      - name: Build standalone exe (PyInstaller)
        run: uv run --no-sync pyinstaller packaging/reku.spec --noconfirm

      # Смоук собранного exe на CPU (REKU_SELFTEST=1): грузит модель small и
      # транскрибирует тишину. device=cpu в конфиге — на раннере нет GPU, а auto
      # сперва тянул бы тяжёлую OV-модель только ради падения компиляции.
      - name: Smoke-test built exe (CPU selftest)
        shell: pwsh
        run: |
          $dataDir = Join-Path $env:APPDATA "Reku"
          New-Item -ItemType Directory -Force $dataDir | Out-Null
          '{"device": "cpu", "model": "small"}' | Set-Content (Join-Path $dataDir "config.json") -Encoding UTF8
          $env:REKU_SELFTEST = "1"
          $p = Start-Process -FilePath dist\Reku\Reku.exe -Wait -PassThru
          Get-Content (Join-Path $dataDir "selftest.json") -ErrorAction SilentlyContinue
          if ($p.ExitCode -ne 0) { Write-Error "selftest exit code $($p.ExitCode)"; exit 1 }

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=$env:APP_VERSION packaging\reku.iss

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Reku-setup.exe
